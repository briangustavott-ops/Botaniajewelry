<svg width="1000" height="620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1208" flood-opacity="0.07"/></filter>
  </defs>
  <rect width="1000" height="620" fill="#F7F2EC"/>

  <!-- ══════════ SIDEBAR ══════════ -->
  <rect width="220" height="620" fill="#1E1208"/>
  <rect width="220" height="70" fill="#140C04"/>
  <circle cx="30" cy="35" r="16" fill="#2A1508"/>
  <text x="30" y="41" text-anchor="middle" fill="#C17D3C" font-size="18">✿</text>
  <text x="125" y="29" text-anchor="middle" fill="#E8C4A0" font-size="14" font-weight="bold">Botania Jewelry</text>
  <text x="125" y="50" text-anchor="middle" fill="#6B4C2A" font-size="11">Panel de control</text>
  <text x="22" y="102" fill="#8B7355" font-size="13">📥  Bandeja de revisión</text>
  <circle cx="203" cy="97" r="10" fill="#E53935"/>
  <text x="203" y="101" text-anchor="middle" fill="white" font-size="10" font-weight="bold">3</text>

  <!-- Nav: Subir ACTIVE -->
  <rect x="0" y="116" width="220" height="38" fill="#5C2D0E"/>
  <rect x="0" y="116" width="4" height="38" fill="#C17D3C"/>
  <text x="22" y="140" fill="#FFFFFF" font-size="13">📤  Subir contenido</text>

  <text x="22" y="178" fill="#8B7355" font-size="13">📚  Biblioteca</text>
  <text x="22" y="216" fill="#8B7355" font-size="13">📱  Publicar</text>
  <text x="22" y="254" fill="#8B7355" font-size="13">📦  Productos Etsy</text>
  <text x="22" y="292" fill="#8B7355" font-size="13">⚙️  Gestión de APIs</text>
  <line x1="15" y1="314" x2="205" y2="314" stroke="#2A1508"/>
  <text x="22" y="334" fill="#6B4C2A" font-size="10" letter-spacing="1">SERVICIOS</text>
  <circle cx="22" cy="354" r="5" fill="#4CAF50"/>
  <text x="36" y="358" fill="#8B7355" font-size="11">Instagram API</text>
  <circle cx="22" cy="374" r="5" fill="#4CAF50"/>
  <text x="36" y="378" fill="#8B7355" font-size="11">Etsy API</text>
  <circle cx="22" cy="394" r="5" fill="#FF9800"/>
  <text x="36" y="398" fill="#8B7355" font-size="11">Meta Token (12d) ⚠</text>
  <circle cx="22" cy="414" r="5" fill="#4CAF50"/>
  <text x="36" y="418" fill="#8B7355" font-size="11">Claude API</text>
  <text x="22" y="605" fill="#3A2010" font-size="10">v1.0 · Botania © 2025</text>

  <!-- ══════════ TOP BAR ══════════ -->
  <rect x="220" y="0" width="780" height="65" fill="white"/>
  <line x1="220" y1="65" x2="1000" y2="65" stroke="#E8DDD5"/>
  <text x="242" y="33" fill="#1E1208" font-size="18" font-weight="bold">Subir contenido</text>
  <text x="242" y="53" fill="#9B8878" font-size="12">Añade fotos o vídeos a la biblioteca · La IA analizará y sugerirá el contenido automáticamente</text>

  <!-- ══════════ LEFT PANEL — Drop zone + preview ══════════ -->
  <rect x="232" y="78" width="360" height="510" rx="10" fill="white" filter="url(#shadow)"/>

  <!-- Drop zone -->
  <rect x="252" y="96" width="320" height="190" rx="12" fill="#FAF7F4" stroke="#C17D3C" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="412" y="160" text-anchor="middle" fill="#C17D3C" font-size="44">📎</text>
  <text x="412" y="200" text-anchor="middle" fill="#6B5744" font-size="14" font-weight="bold">Arrastra tus fotos o vídeos</text>
  <text x="412" y="220" text-anchor="middle" fill="#9B8878" font-size="12">o</text>
  <rect x="352" y="232" width="120" height="32" rx="7" fill="#C17D3C"/>
  <text x="412" y="253" text-anchor="middle" fill="white" font-size="13">Seleccionar archivo</text>
  <text x="412" y="274" text-anchor="middle" fill="#B0A090" font-size="10">JPG, PNG, MP4, MOV · máx. 50 MB</text>

  <!-- File preview (shown after upload) -->
  <line x1="252" y1="300" x2="572" y2="300" stroke="#E8DDD5"/>
  <text x="412" y="320" text-anchor="middle" fill="#9B8878" font-size="11">Vista previa del archivo seleccionado</text>
  <rect x="265" y="332" width="80" height="80" rx="8" fill="#F5E6D3"/>
  <text x="305" y="382" text-anchor="middle" fill="#C17D3C" font-size="32">🌸</text>
  <text x="360" y="352" fill="#1E1208" font-size="13" font-weight="bold">colgante_lavanda_003.jpg</text>
  <text x="360" y="370" fill="#9B8878" font-size="11">1.8 MB · JPG · 2048 × 2048 px</text>
  <circle cx="360" cy="392" r="5" fill="#4CAF50"/>
  <text x="372" y="396" fill="#4CAF50" font-size="11">Listo para procesar</text>

  <!-- Análisis IA progress -->
  <rect x="252" y="430" width="320" height="60" rx="8" fill="#FEF8F0"/>
  <text x="272" y="450" fill="#8B4513" font-size="12" font-weight="bold">✨ Analizando con IA...</text>
  <rect x="272" y="460" width="280" height="6" rx="3" fill="#E8DDD5"/>
  <rect x="272" y="460" width="195" height="6" rx="3" fill="#C17D3C"/>
  <text x="272" y="482" fill="#9B8878" font-size="10">Detectando colores, materiales y categoría...</text>

  <!-- Botón guardar -->
  <rect x="252" y="510" width="320" height="40" rx="8" fill="#1E1208"/>
  <text x="412" y="536" text-anchor="middle" fill="white" font-size="14" font-weight="bold">💾 Guardar en biblioteca</text>

  <!-- ══════════ RIGHT PANEL — Formulario ══════════ -->
  <rect x="606" y="78" width="382" height="510" rx="10" fill="white" filter="url(#shadow)"/>
  <text x="626" y="110" fill="#1E1208" font-size="15" font-weight="bold">Detalles del contenido</text>
  <line x1="626" y1="120" x2="970" y2="120" stroke="#E8DDD5"/>

  <!-- Categoría -->
  <text x="626" y="148" fill="#6B5744" font-size="12" font-weight="bold">Categoría</text>
  <rect x="626" y="155" width="342" height="34" rx="6" fill="#F7F2EC" stroke="#E8DDD5" stroke-width="1"/>
  <text x="642" y="177" fill="#1E1208" font-size="12">Pendientes</text>
  <text x="950" y="177" text-anchor="middle" fill="#9B8878" font-size="12">▾</text>

  <!-- Historia -->
  <text x="626" y="210" fill="#6B5744" font-size="12" font-weight="bold">Historia / descripción</text>
  <rect x="626" y="217" width="342" height="80" rx="6" fill="#F7F2EC" stroke="#E8DDD5" stroke-width="1"/>
  <text x="642" y="238" fill="#9B8878" font-size="11">Cuéntanos algo sobre esta pieza...</text>
  <text x="642" y="256" fill="#9B8878" font-size="11">¿Qué la hace especial? ¿Qué la inspiró?</text>

  <!-- Botón IA -->
  <rect x="626" y="305" width="342" height="36" rx="7" fill="#FEF8F0" stroke="#C17D3C" stroke-width="1.5"/>
  <text x="797" y="328" text-anchor="middle" fill="#8B4513" font-size="13" font-weight="bold">✨ Sugerir texto con IA</text>

  <!-- Sugerencia IA (resultado) -->
  <rect x="626" y="350" width="342" height="72" rx="6" fill="#FEF8F0"/>
  <rect x="626" y="350" width="4" height="72" rx="2" fill="#C17D3C"/>
  <text x="640" y="368" fill="#8B4513" font-size="10" font-weight="bold">✨ Sugerencia generada</text>
  <text x="640" y="385" fill="#6B5744" font-size="10">Colgante artesanal de resina con lavanda</text>
  <text x="640" y="400" fill="#6B5744" font-size="10">real. Perfume natural, pieza única.</text>
  <text x="640" y="415" fill="#9B8878" font-size="10">← Haz clic para usar esta sugerencia</text>

  <!-- Hashtags -->
  <text x="626" y="444" fill="#6B5744" font-size="12" font-weight="bold">Hashtags</text>
  <rect x="626" y="451" width="342" height="34" rx="6" fill="#F7F2EC" stroke="#E8DDD5" stroke-width="1"/>
  <text x="642" y="473" fill="#1E1208" font-size="11">#botanica  #lavanda  #resina  #colgante</text>

  <!-- Plataforma -->
  <text x="626" y="506" fill="#6B5744" font-size="12" font-weight="bold">Publicar en</text>
  <rect x="626" y="515" width="22" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="637" y="531" text-anchor="middle" fill="#2E7D32" font-size="14">✓</text>
  <text x="654" y="531" fill="#1E1208" font-size="12">Instagram</text>
  <rect x="730" y="515" width="22" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="741" y="531" text-anchor="middle" fill="#2E7D32" font-size="14">✓</text>
  <text x="758" y="531" fill="#1E1208" font-size="12">Etsy</text>
  <rect x="818" y="515" width="22" height="22" rx="4" fill="#F7F2EC" stroke="#E8DDD5" stroke-width="1"/>
  <text x="856" y="531" fill="#1E1208" font-size="12">Web</text>

  <!-- Idioma -->
  <text x="626" y="558" fill="#6B5744" font-size="12" font-weight="bold">Idioma</text>
  <rect x="730" y="545" width="55" height="26" rx="13" fill="#C17D3C"/>
  <text x="758" y="563" text-anchor="middle" fill="white" font-size="12">ES</text>
  <rect x="793" y="545" width="55" height="26" rx="13" fill="#F7F2EC" stroke="#E8DDD5" stroke-width="1"/>
  <text x="821" y="563" text-anchor="middle" fill="#9B8878" font-size="12">EN</text>
  <rect x="856" y="545" width="80" height="26" rx="13" fill="#F7F2EC" stroke="#E8DDD5" stroke-width="1"/>
  <text x="896" y="563" text-anchor="middle" fill="#9B8878" font-size="12">Ambos</text>
</svg>
